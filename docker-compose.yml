services:
  av-service:
    image: ghcr.io/cipfz/youtobe-parser:latest
    pull_policy: always
    container_name: av-service
    
    # 1. 使用 USER_ID 和 GROUP_ID 匹配脚本中的导出变量
    # :-1000 表示如果变量未定义，则默认使用 UID 1000，消除空字符串警告
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      - ./data/input:/data/input
      - ./data/output:/data/output
      - ./models/whisper:/models/whisper
      - ./logs:/app/logs
    environment:
      # 2. 传递给容器内部，以便 entrypoint.sh 处理特殊权限逻辑
      - USER_ID=${USER_ID:-1000}
      - GROUP_ID=${GROUP_ID:-1000}
      - AV_TASK_DB_PATH=/data/output/task_manager.db
      - LD_LIBRARY_PATH=/usr/local/lib