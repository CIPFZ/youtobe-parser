# YouTube Parser — docker compose
# Architecture:
# - app: all-in-one container (FastAPI API + built frontend static files)
# - redis: shared generic Redis for task metadata
# Optional:
# - enable `pot` profile to run bundled yt-dlp PO token provider

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ytparser-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - PO_TOKEN_SERVER=${PO_TOKEN_SERVER:-http://pot-provider:4416}
    ports:
      - "8000:8000"
    volumes:
      - ./downloads:/app/downloads
    depends_on:
      redis:
        condition: service_healthy
    # Allow containers to reach host services (e.g. local proxy on host)
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:7-alpine
    container_name: ytparser-redis
    restart: unless-stopped
    # 建议在 command 中增加 maxmemory 限制（通常设为容器限制的 80% 左右）
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "400mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    # --- 新增资源限制配置 ---
    deploy:
      resources:
        limits:
          cpus: '0.50'        # 限制最多使用 0.5 核 CPU
          memory: 512M        # 限制最多使用 512MB 内存（硬限制）
        reservations:
          cpus: '0.25'        # 预留 0.25 核 CPU（软限制）
          memory: 256M        # 预留 256MB 内存
    # -----------------------
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: ytparser-pot-provider
    restart: unless-stopped
    profiles: ["pot"]
    ports:
      - "4416:4416"
    environment:
      - TOKEN_TIMEOUT=15000
      - http_proxy=${POT_PROXY:-}
      - https_proxy=${POT_PROXY:-}
    # Needed on Linux to reach host proxy via host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
