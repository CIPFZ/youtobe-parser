name: Build AV Service Docker Image

on:
  push:
    branches: ["main", "use_script"]
    paths:
      - "server/**"
      - "docker-compose.yml"
      - ".github/workflows/docker-av-service.yml"
      - "main.py"
      - "pyproject.toml"
      - "scripts/**"
  pull_request:
    branches: ["main", "use_script"]
    paths:
      - "server/**"
      - "docker-compose.yml"
      - ".github/workflows/docker-av-service.yml"
      - "main.py"
      - "pyproject.toml"
      - "scripts/**"
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Decide push mode
        id: push_mode
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "can_push=false" >> "$GITHUB_OUTPUT"
            echo "reason=Pull request: build only" >> "$GITHUB_OUTPUT"
          elif [ -n "${GHCR_TOKEN}" ]; then
            echo "can_push=true" >> "$GITHUB_OUTPUT"
            echo "reason=GHCR_TOKEN provided" >> "$GITHUB_OUTPUT"
          else
            echo "can_push=false" >> "$GITHUB_OUTPUT"
            echo "reason=GHCR_TOKEN missing (required for GHCR push)" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.push_mode.outputs.can_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/youtobe-workflow/av-service
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and (optionally) push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64
          push: ${{ steps.push_mode.outputs.can_push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push mode summary
        run: echo "push=${{ steps.push_mode.outputs.can_push }} (${{ steps.push_mode.outputs.reason }})"
